name: Build Android APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Tell it to look inside the android folder to make it executable
    - name: Make Gradle executable
      run: chmod +x android/gradlew

    # Tell it to go inside the android folder before building
    - name: Build the APK
      run: |
        cd android
        ./gradlew assembleDebug

    # Tell it where to find the finished app inside the android folder
    - name: Upload the APK so you can download it
      uses: actions/upload-artifact@v4
      with:
        name: Activity-AI-Android-App
        path: android/app/build/outputs/apk/debug/*.apk
